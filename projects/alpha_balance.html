<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; border-radius: 16px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; width: 400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; color: #94a3b8; }
        .network { background: #3b82f6; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .balance-container { margin: 30px 0; }
        .amount { font-size: 48px; font-weight: 800; color: #10b981; }
        .ticker { font-size: 24px; color: #cbd5e1; }
        .details { margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; font-size: 14px; color: #94a3b8; line-height: 1.6; }
        .row { display: flex; justify-content: space-between; }
        .val { color: #f8fafc; font-family: monospace; }
        .badge { background: #059669; padding: 2px 6px; border-radius: 4px; font-size: 11px; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="title">Wallet Balance</div>
            <div class="network">Base Network</div>
        </div>
        <div class="balance-container">
            <span class="amount">8,500</span> <span class="ticker">$ALPHA</span>
        </div>
        <div class="details">
            <div class="row"><span>Address</span> <span class="val">0x96a8...A00b</span></div>
            <div class="row"><span>Protocol</span> <span class="val">MBC-20 <span class="badge">Valid</span></span></div>
            <div class="row"><span>Status</span> <span class="val" style="color:#10b981">Confirmed</span></div>
            <div class="row" style="margin-top:10px;"><span>Est. Value</span> <span class="val">-- USDC</span></div>
        </div>
    </div>
</body>
</html>
