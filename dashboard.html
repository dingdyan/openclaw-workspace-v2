<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Collaboration Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
    <h1 class="text-3xl font-bold mb-8 text-cyan-400">Agent Collaboration Dashboard</h1>
    <div id="grid" class="grid grid-cols-2 gap-6">
        <!-- Dashboard populated by server -->
    </div>
    <script>
        async function update() {
            try {
                const res = await fetch('/api/stats').then(r => r.json());
                document.getElementById('grid').innerHTML = res.sessions.map(s => `
                    <div class="bg-gray-800 border border-cyan-500/30 p-6 rounded-lg shadow-xl">
                        <h2 class="text-xl font-bold">${s.key}</h2>
                        <p class="text-sm opacity-60">Model: ${s.model}</p>
                        <div class="mt-4 bg-black h-4 rounded-full overflow-hidden">
                            <div class="bg-cyan-500 h-full" style="width: 50%"></div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error('Dashboard offline'); }
        }
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
